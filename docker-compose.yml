services:
  backend:
    build: ./backend
    expose:
      - "4000"
    environment:
      - PORT=4000
      - PGUSER=${PGUSER:-student}
      - PGPASSWORD=${PGPASSWORD:-studentpass}
      - PGDATABASE=${PGDATABASE:-school}
      - PGHOST=postgres
      - PGPORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16.9
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${PGUSER:-student}
      POSTGRES_PASSWORD: ${PGPASSWORD:-studentpass}
      POSTGRES_DB: ${PGDATABASE:-school}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-student} -d ${PGDATABASE:-school}"]
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
