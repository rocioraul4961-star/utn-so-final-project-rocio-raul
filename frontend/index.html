<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Estudiantes</title>
     <link rel="shortcut icon" href="https://www.utn.edu.ar/favicon.ico?v=2" type="image/x-icon"> 
    <link rel="stylesheet" href="styles_modern.css" />
  </head>
  <body>
    <h1>Lista de Estudiantes</h1>
    <button id="loadButton">Cargar Estudiantes</button>
    <br /><br />
    <!-- Saludo -->
    <input type="text" id="nombreInput" placeholder="Escribí tu nombre">
    <button id="saludarButton">Saludarme</button>
    <p id="saludoTexto"></p>

    <!-- Agregar Estudiante -->
    <h2>Agregar Estudiante</h2>
    <input type="text" id="newStudentName" placeholder="Nombre del estudiante">
    <button id="addStudentButton">Agregar Estudiante</button>
    <table id="studentsTable">
      <thead>
        <tr>
          <th>Id</th>
          <th>Nombre</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script src="script.js"></script>
  </body>
</html>
